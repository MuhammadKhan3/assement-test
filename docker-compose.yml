
services:
  postgres:
    image: postgres:15-alpine
    container_name: flashdeal_postgres
    environment:
      POSTGRES_USER: flashdeal
      POSTGRES_PASSWORD: flashdeal_secret
      POSTGRES_DB: flashdeal_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashdeal -d flashdeal_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flashdeal_redis
    command: redis-server --notify-keyspace-events KEx
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
